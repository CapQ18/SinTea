<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景圆 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D0A9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8B88A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#F0E6D3;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- 圆形底色 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" />

  <!-- 奶茶杯身 -->
  <path d="M168 200 L168 380 Q168 410 200 410 L312 410 Q344 410 344 380 L344 200 Z"
        fill="url(#cupGrad)" stroke="#D4A574" stroke-width="4" />

  <!-- 杯口高光 -->
  <ellipse cx="256" cy="200" rx="88" ry="20" fill="#FFF8F0" stroke="#D4A574" stroke-width="4" />

  <!-- 奶茶液体（棕色） -->
  <ellipse cx="256" cy="205" rx="82" ry="16" fill="#C8966E" />

  <!-- 珍珠（boba） -->
  <circle cx="220" cy="300" r="15" fill="#3E2723" />
  <circle cx="260" cy="320" r="15" fill="#3E2723" />
  <circle cx="290" cy="280" r="15" fill="#3E2723" />
  <circle cx="235" cy="350" r="13" fill="#3E2723" />
  <circle cx="275" cy="355" r="13" fill="#3E2723" />
  <circle cx="210" cy="270" r="13" fill="#3E2723" />
  <circle cx="295" cy="310" r="13" fill="#3E2723" />

  <!-- 吸管 -->
  <rect x="290" y="100" width="14" height="180" rx="7" fill="#FF8A80" opacity="0.9" />
  <rect x="293" y="100" width="5" height="180" fill="#FFAB91" opacity="0.5" />

  <!-- 杯子把手形状（在右边） -->
  <path d="M344 230 Q380 230 380 280 Q380 330 344 330"
        fill="none" stroke="#D4A574" stroke-width="12" stroke-linecap="round" />

  <!-- 底部文字 -->
  <text x="256" y="470" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="40" font-weight="bold" fill="#8B6914" letter-spacing="8">
    SinTea
  </text>
</svg>
